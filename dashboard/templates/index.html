<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RNS Trader — MATD</title>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
         background:#0f1117;color:#e0e0e0;overflow-x:hidden}
    .topbar{padding:18px 28px 0;border-bottom:1px solid #2a2d3e}
    .topbar h1{font-size:1.4rem;font-weight:700;color:#fff}
    .subtitle{color:#888;font-size:.85rem;margin:3px 0 14px}
    .tabs{display:flex;gap:4px}
    .tab{padding:8px 20px;border-radius:6px 6px 0 0;cursor:pointer;
         font-size:.88rem;font-weight:600;color:#888;
         border:1px solid transparent;border-bottom:none;
         background:transparent;transition:all .15s}
    .tab:hover{color:#ccc}
    .tab.active{background:#1c1f2e;color:#fff;border-color:#2a2d3e}
    .panel{display:none;padding:24px 28px}
    .panel.active{display:block}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
          gap:18px;margin-bottom:24px}
    .card{background:#1c1f2e;border:1px solid #2a2d3e;border-radius:10px;padding:18px}
    .card h2{font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;
             color:#888;margin-bottom:12px}
    .stat-row{display:flex;justify-content:space-between;align-items:center;
              padding:6px 0;border-bottom:1px solid #2a2d3e;font-size:.88rem}
    .stat-row:last-child{border-bottom:none}
    .stat-row .label{color:#aaa}
    .stat-row .value{color:#fff;font-weight:600}
    .big-number{font-size:2.4rem;font-weight:700;color:#fff;line-height:1;margin-bottom:4px}
    .big-label{color:#888;font-size:.82rem;margin-bottom:14px}
    .badge{display:inline-block;padding:2px 8px;border-radius:4px;
           font-size:.75rem;font-weight:600;background:#2a2d3e;color:#aaa}
    .badge.ok{background:#1a3a2a;color:#4caf7d}
    .badge.warn{background:#3a2a1a;color:#f0a500}
    .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
              gap:12px;margin-bottom:22px}
    .kpi{background:#1c1f2e;border:1px solid #2a2d3e;border-radius:8px;
         padding:14px 16px;text-align:center}
    .kpi .kv{font-size:1.8rem;font-weight:800;color:#fff;line-height:1}
    .kpi .kl{font-size:.7rem;color:#888;text-transform:uppercase;
             letter-spacing:.06em;margin-top:4px}
    .kpi.green .kv{color:#4caf7d}
    .kpi.red   .kv{color:#f07070}
    .kpi.blue  .kv{color:#4d9fff}
    .kpi.yellow .kv{color:#ffdd4d}
    .section-title{font-size:.95rem;font-weight:700;color:#fff;margin:22px 0 12px}
    .hint{color:#555;font-size:.78rem;font-weight:400;margin-left:8px}
    table{width:100%;border-collapse:collapse;font-size:.84rem}
    th{text-align:left;padding:8px 10px;color:#888;font-weight:600;
       font-size:.72rem;text-transform:uppercase;border-bottom:1px solid #2a2d3e}
    td{padding:7px 10px;border-bottom:1px solid #1a1d2e;color:#ccc}
    tr:last-child td{border-bottom:none}
    tr.clickable{cursor:pointer}
    tr.clickable:hover td{background:#22263a}
    .cat-tag{display:inline-block;padding:2px 7px;border-radius:4px;
             font-size:.73rem;font-weight:700;background:#2a2d3e;color:#7eb8f7}
    .score-bar-wrap{display:flex;align-items:center;gap:10px}
    .score-bar{height:8px;border-radius:4px;background:#2a2d3e;flex:1}
    .score-bar-fill{height:100%;border-radius:4px}
    .pos{color:#4caf7d;font-weight:600}
    .neg{color:#f07070;font-weight:600}
    .neu{color:#888}
    .tbadge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.72rem;font-weight:600}
    .tbadge.pre_market{background:#2a2a1a;color:#c8c860}
    .tbadge.intraday{background:#1a2e3a;color:#4db8ff}
    .tbadge.post_market{background:#2a1a2a;color:#c88}
    .tbadge.unknown{background:#2a2d3e;color:#666}
    .sbadge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.72rem;font-weight:600}
    .sbadge.strong{background:#1a3a2a;color:#4caf7d}
    .sbadge.neutral{background:#2a2d3e;color:#aaa}
    .sbadge.extended{background:#3a2a1a;color:#f0a500}
    .sbadge.skip{background:#3a1a1a;color:#f07070}
    .chart-card{background:#1c1f2e;border:1px solid #2a2d3e;
                border-radius:10px;padding:16px;margin-bottom:22px}
    .analysis-grid{display:grid;
                   grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
                   gap:18px;margin-bottom:22px}
    #price-chart{width:100%;height:520px}
    #pnl-chart{width:100%;height:260px}
    #strength-dist-chart{width:100%;height:220px}
    #strength-bucket-chart{width:100%;height:220px}
    #chart-loading{text-align:center;padding:80px;color:#555;font-size:.9rem}
    .legend-row{display:flex;flex-wrap:wrap;gap:10px;padding:10px 0 2px}
    .legend-item{display:flex;align-items:center;gap:6px;font-size:.8rem;color:#aaa}
    .legend-dot{width:10px;height:10px;border-radius:50%}
    .empty-state{text-align:center;padding:60px;color:#555;font-size:.9rem}
    #drawer-overlay{display:none;position:fixed;inset:0;
                    background:rgba(0,0,0,.55);z-index:100}
    #drawer-overlay.open{display:block}
    #drawer{position:fixed;top:0;right:-680px;width:640px;height:100vh;
            background:#161926;border-left:1px solid #2a2d3e;z-index:101;
            transition:right .28s cubic-bezier(.4,0,.2,1);
            display:flex;flex-direction:column;overflow:hidden}
    #drawer.open{right:0}
    .drawer-header{display:flex;align-items:flex-start;justify-content:space-between;
                   padding:20px 24px 16px;border-bottom:1px solid #2a2d3e;flex-shrink:0}
    .drawer-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
    .drawer-cat
